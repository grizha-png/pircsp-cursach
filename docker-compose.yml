services:
  backend:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: edutest-backend
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: edutest-frontend
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "8080:80"
